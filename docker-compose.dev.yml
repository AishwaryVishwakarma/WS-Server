# Local development infrastructure. Runs on alternate ports (MySQL 3310,
# Redis 6380) so it can coexist with natively installed MySQL/Redis — point
# .env at it to use it (see README "Development database").
services:
  mysql-dev:
    image: mysql:8
    container_name: ws-mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: dev
      MYSQL_DATABASE: ws_dev
    ports:
      - '3310:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-pdev']
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - ws-mysql-dev-data:/var/lib/mysql

  redis-dev:
    image: redis:7
    container_name: ws-redis-dev
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  ws-mysql-dev-data:
