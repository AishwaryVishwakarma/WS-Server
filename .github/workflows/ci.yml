name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  checks:
    name: Typecheck, lint, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npx eslint "{src,test}/**/*.ts"

      - run: npm test

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    # Same images/ports/credentials as docker-compose.test.yml + .env.test
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: ws_test
        ports:
          - 3311:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -ptest"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
      redis:
        image: redis:7
        ports:
          - 6381:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run test:integration
