services:
  mysql-test:
    image: mysql:8
    container_name: ws-mysql-test
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: ws_test
    ports:
      - '3311:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-ptest']
      interval: 2s
      timeout: 5s
      retries: 30
    tmpfs:
      - /var/lib/mysql

  redis-test:
    image: redis:7
    container_name: ws-redis-test
    ports:
      - '6381:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 2s
      timeout: 5s
      retries: 30
